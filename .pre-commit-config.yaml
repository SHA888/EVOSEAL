# Global exclude patterns - applies to all hooks
exclude: |
  (?x)^(
    dgm/|
    openevolve/|
    SEAL/|
    .*\.git/.*|
    .*venv/.*|
    .*__pycache__/.*
  )$

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  # Ruff: replaces black, isort, flake8, and pylint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Security - Python code analysis
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [--recursive, --skip, 'B101,B601,B603,B605,B607,B108,B105,B404']
        exclude: |
          (?x)^(
            dgm/|
            openevolve/|
            SEAL/|
            .*venv/|
            .*__pycache__/|
            tests/
          )$

  # Run tests with pytest using our custom script
  - repo: local
    hooks:
      - id: pytest-check
        name: Run unit tests (fast)
        entry: ./scripts/evoseal test
        language: script
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true

  # Detect secrets in code
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline', '--exclude-files', 'checkpoints/.*\.json$']
        exclude: |
          (?x)^(
            dgm/|
            openevolve/|
            SEAL/|
            .*venv/|
            .*__pycache__/|
            .*node_modules/|
            .*\.min\.js$|
            .*\.svg$|
            .*\.jpg$|
            .*\.png$|
            .*\.gif$
          )$
        stages: [pre-commit, pre-push]

  # Dockerfile linter
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        name: hadolint
        description: 'Dockerfile linter'
        entry: hadolint --ignore DL3006 --ignore DL3008 --ignore DL3013
        language: docker_image
        types: [dockerfile]

  # TruffleHog - Find secrets in git history
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.66.0
    hooks:
      - id: trufflehog
        name: trufflehog
        description: 'Find secrets in git history'
        entry: trufflehog git file://. --since-commit HEAD --no-update --entropy=False --no-verification
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
